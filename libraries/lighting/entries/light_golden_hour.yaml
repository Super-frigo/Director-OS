library:
  schema_version: "1.0"
  metadata:
    id: light_golden_hour
    name: Golden Hour Natural Light
    author: Director OS
  category: lighting
  knowledge:
    concept: "Warm, low-angle sunlight during the first and last hour of the day. Soft shadows, warm color temperature (3200K-4300K), long shadows."
    principles:
      - "Low sun angle creates long, dramatic shadows"
      - "Warm temperature flatters skin tones naturally"
      - "Light passes through more atmosphere, scattering blue light"
      - "Creates natural rim light effect"
    emotional_effects:
      - warmth
      - nostalgia
      - hope
      - beauty
      - transience
    techniques:
      - "Position subject between camera and sun for rim light"
      - "Use backlight for silhouette with warm edge light"
      - "Lens flare as intentional cinematic device"
      - "Combine with 85mm for compressed golden portraits"
    constraints:
      - "Window of approximately 40 minutes"
      - "Weather dependent"
      - "Color temperature shifts rapidly, requiring white balance adjustment"
  applicability:
    emotions:
      - hope
      - love
      - nostalgia
      - peace
      - melancholy
    genres:
      - romance
      - drama
      - coming_of_age
      - commercial
    keywords:
      - sunset
      - warm
      - dreamlike
      - memory
  engine_guidance:
    when_to_use: "Scene requires warmth, nostalgia, or the feeling of a fleeting beautiful moment"
    recommended_actions:
      - "Use BACK position for silhouette with rim light"
      - "Combine with WIDE framing for landscape + character"
    avoid:
      - "Scenes requiring cold clinical atmosphere"
      - "High-noon temporal setting"
  relationships:
    related:
      - light_blue_hour
      - light_warm_interior
    conflicts:
      - light_fluorescent_clinical
  version: "1.0"
