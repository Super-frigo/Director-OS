library:
  schema_version: "1.0"
  metadata:
    id: light_low_key_noir
    name: Low-Key Noir Lighting
    author: Director OS
  category: lighting
  knowledge:
    concept: "High-contrast lighting with deep shadows and minimal fill. Key light from a single strong source, leaving large areas of darkness."
    principles:
      - "Key-to-fill ratio of 8:1 or greater"
      - "Hard light source from 45-degree upper side"
      - "Shadows fall across face, hiding half or more of the frame"
      - "Rim light separates subject from dark background"
    emotional_effects:
      - mystery
      - danger
      - moral ambiguity
      - tension
    techniques:
      - "Single key light with no fill for maximum contrast"
      - "Use practical lamps as motivated source"
      - "Side light for interrogation or revelation scenes"
      - "Under-light for horror or menace (flashlight from below)"
    constraints:
      - "Not suitable for daytime or naturalistic scenes"
      - "Requires controlled environment (difficult on bright outdoor sets)"
  applicability:
    emotions:
      - fear
      - suspicion
      - tension
      - mystery
    genres:
      - noir
      - thriller
      - horror
      - psychological_drama
    keywords:
      - interrogation
      - night
      - secret
      - danger
  engine_guidance:
    when_to_use: "Scene requires moral ambiguity, hidden information, or psychological tension"
    recommended_actions:
      - "Combine with DUTCH_ANGLE for maximum disorientation"
      - "Use SIDE or FRONTAL_45 light position"
    avoid:
      - "Happy or resolution scenes"
      - "Daylight exterior sequences"
  relationships:
    related:
      - light chiaroscuro
      - light rim_only
    conflicts:
      - light_high_key_bright
  version: "1.0"
