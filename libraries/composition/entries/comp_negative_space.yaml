library:
  schema_version: "1.0"
  metadata:
    id: comp_negative_space
    name: Negative Space Composition
    author: Director OS
  category: composition
  knowledge:
    concept: "Placing subject in a small portion of the frame, leaving the rest empty. Visual silence that amplifies emotion through absence."
    principles:
      - "Subject occupies less than 1/3 of frame area"
      - "Empty space has intentional visual weight"
      - "Direction of gaze determines space placement (look room)"
      - "Emptiness becomes active story element"
    emotional_effects:
      - isolation
      - loneliness
      - contemplation
      - insignificance
      - freedom
    techniques:
      - "Place subject at the edge of frame, looking into the void"
      - "Use for transitions between emotional states"
      - "Extreme wide shot with tiny subject for maximum effect"
      - "Pair with long duration — hold the silence"
    constraints:
      - "Not effective for action or dialogue"
      - "Audience patience required — use sparingly"
      - "Requires cinematographic context to feel intentional, not accidental"
  applicability:
    emotions:
      - loneliness
      - reflection
      - awe
      - despair
    genres:
      - art_house
      - drama
      - science_fiction
      - western
    keywords:
      - isolation
      - emptiness
      - silence
      - vastness
  engine_guidance:
    when_to_use: "Character is emotionally isolated, contemplating, or overwhelmed by their environment"
    recommended_actions:
      - "Use 24mm or wider lens for maximum scale contrast"
      - "Combine with restrained camera movement"
    avoid:
      - "Dialogue-heavy scenes"
      - "Fast-paced sequences"
  relationships:
    related:
      - lens_24mm_wide
      - comp_rule_of_thirds
      - camera_static_observation
    conflicts:
      - comp_fill_frame
  version: "1.0"
