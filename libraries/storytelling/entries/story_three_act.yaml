library:
  schema_version: "1.0"
  metadata:
    id: story_three_act
    name: Three-Act Structure
    author: Director OS
  category: storytelling
  knowledge:
    concept: "The most universal narrative structure. Setup → Confrontation → Resolution. Each act has a distinct dramatic function."
    principles:
      - "Act 1 (25%): Introduce world, characters, and inciting incident"
      - "Act 2 (50%): Rising stakes, obstacles, midpoint reversal"
      - "Act 3 (25%): Climax, falling action, resolution"
      - "Each act ends with a turning point that raises stakes"
    emotional_effects:
      - narrative satisfaction
      - anticipation
      - catharsis
    techniques:
      - "Inciting incident must occur by end of Act 1"
      - "Midpoint in Act 2 changes the character's goal or understanding"
      - "All subplots resolve in Act 3 before main climax"
    constraints:
      - "Not suitable for experimental or non-linear narratives"
      - "Short-form content (15-60s) may need compressed version (2 beats)"
  applicability:
    emotions:
      - satisfaction
      - anticipation
    genres:
      - drama
      - action
      - thriller
      - comedy
    keywords:
      - structure
      - plot
      - narrative
  engine_guidance:
    when_to_use: "Standard narrative filmmaking with clear protagonist goal"
    recommended_actions:
      - "Distribute beats as 25/50/25 percentage of total duration"
      - "Place inciting incident at 20-25% mark"
    avoid:
      - "Non-linear narratives"
      - "Abstract or atmospheric shorts (use 2-beat instead)"
  relationships:
    related:
      - story_heros_journey
      - story_beat_types
  version: "1.0"
