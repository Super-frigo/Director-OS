library:
  schema_version: "1.0"
  metadata:
    id: worldbuilding_template
    name: Worldbuilding Framework — Structured World Creation
    author: Director OS (imported from AI-Director-OS worldbook)
  category: storytelling
  knowledge:
    concept: "Worldbuilding template derived from AI-Director-OS worldbook. A world is not a 'background setting' — it is the internal logic that shapes character behavior, the reason for every object in the frame, and the physical source of light and shadow. Use this template to construct complete, narratively-consistent worlds."
    principles:
      - "World is the biggest character — Denis Villeneuve"
      - "Core setting first: name, era, central conflict, emotional tone"
      - "Physics define possibility: gravity, time, abnormal physics (magic/tech limits)"
      - "Geography shapes culture: terrain, climate, landmarks determine how people live"
      - "Social structure drives conflict: power, class, culture, technology level"
      - "Visual anchors define recognition: one image that evokes the entire world"
      - "Narrative rules guide storytelling: how stories are told in this world, what questions it asks"
    emotional_effects:
      - immersion
      - consistency
      - believability
    techniques:
      - "Define core setting: name, era (ancient/modern/near-future/far-future/alternate/mixed), central conflict (one sentence), emotional tone (hope/despair/absurd/epic/intimate/oppressive/unknown)"
      - "Establish physical laws: gravity (standard/alien), time (linear/cyclic/branching/variable), abnormal physics rules"
      - "Design geography: terrain, climate, iconic landmark, environmental color palette"
      - "Build social structure: power center, class hierarchy, cultural traits (religion/art/festivals/taboos), tech/magic level (1-10)"
      - "Define visual anchors: one image that defines the world, material feel, light character, color script"
      - "Set narrative rules: how stories are told in this world, core question the world asks, absolute boundaries"
      - "Bind visual style from visual_style library"
    constraints:
      - "World must serve story — not overwhelm it"
      - "Internal consistency is more important than realism"
      - "A world without a core question is decoration, not worldbuilding"
  applicability:
    emotions:
      - all
    genres:
      - all
    keywords:
      - worldbuilding
      - world creation
      - setting
      - universe
      - environment
  engine_guidance:
    when_to_use: "Building a new world for a project, or expanding an existing world"
    recommended_actions:
      - "Start with core setting — everything flows from central conflict and tone"
      - "Define visual anchors before writing prose — the image leads"
      - "Bind a visual style to the world for consistent cinematography"
    avoid:
      - "Building world independently of the story it serves"
      - "Over-specifying details that never appear on screen"
  relationships:
    related:
      - story_three_act
      - story_beat_types
  version: "1.0"
