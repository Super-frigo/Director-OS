library:
  schema_version: "1.0"
  metadata:
    id: story_beat_types
    name: Narrative Beat Types
    author: Director OS
  category: storytelling
  knowledge:
    concept: "Each beat in a story serves a specific narrative function. The beat type determines emotional intensity, pacing, and audience expectation."
    principles:
      - "OPENING: Establish world and normal state (low intensity 1-3)"
      - "INCITING: Event that disrupts normal state (intensity spike 6-8)"
      - "REVELATION: New information changes understanding (intensity 4-7)"
      - "CONFLICT: Direct opposition between forces (intensity 7-9)"
      - "CLIMAX: Highest tension, decisive moment (intensity 9-10)"
      - "RESOLUTION: Consequences and new normal (intensity descends 5-2)"
      - "TRANSITION: Passage of time or change of location (low intensity 1-3)"
    emotional_effects:
      - pacing control
      - emotional rhythm
      - audience engagement
    techniques:
      - "High-intensity beats must be preceded by lower-intensity beats (contrast)"
      - "Never place two CLIMAX beats consecutively"
      - "TRANSITION beats are underused — they give audience breathing room"
    constraints:
      - "Short-form (15-60s) should not exceed 3-5 beats"
      - "Each beat needs minimum 2s to register emotionally"
  applicability:
    emotions:
      - all
    genres:
      - all
    keywords:
      - pacing
      - structure
      - rhythm
  engine_guidance:
    when_to_use: "Any project requiring structured narrative pacing"
    recommended_actions:
      - "For 15s: OPENING → INCITING → CLIMAX (3 beats)"
      - "For 60s: OPENING → INCITING → CONFLICT → REVELATION → CLIMAX → RESOLUTION (6 beats)"
      - "Alternate high/low intensity to maintain engagement"
    avoid:
      - "Monotonous same-intensity sequences"
  relationships:
    related:
      - story_three_act
      - story_emotional_arc
  version: "1.0"
