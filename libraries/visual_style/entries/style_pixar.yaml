library:
  schema_version: "1.0"
  metadata:
    id: style_pixar
    name: Pixar — Arc Aesthetics & Emotional Animation
    author: Director OS (imported from AI-Director-OS)
  category: visual_style
  knowledge:
    concept: "Arc-based 3D animation with rounded, emotionally warm aesthetics. Squash-and-stretch physics, rich textured materials with subsurface scattering, and color-driven emotional storytelling. Soft diffused lighting with warm shadows — never pure black."
    principles:
      - "All shapes prioritize curves — reject sharp right angles"
      - "Character silhouettes are round and full — conveying approachability and elasticity"
      - "Even hardest objects (rocks, buildings) get curved transitions"
      - "Material emphasis: fur texture, brushed metal, wood grain, glass refraction"
      - "NPR with physically-based material logic — diffuse reflection over specular"
      - "Squash & Stretch animation — movement as emotional expression"
      - "Arcs in motion — no straight-line movement paths"
      - "Anticipation — every major action has a reverse micro-movement first"
    emotional_effects:
      - warm
      - joyful
      - emotional
      - nostalgic
      - hopeful
    techniques:
      - "Saturation scales with emotional intensity: climax = high sat, depression = desaturated"
      - "Shadows never pure black — always warm, chocolate-like shadows"
      - "Soft diffused light as default — large-area scattered light"
      - "Emotional lighting: warm light = belonging, cold light = alienation"
      - "Translucent materials: leaves, stained glass, bioluminescence — light media as character"
      - "Precise depth of field — tilt-shift feel separating focus from blur"
      - "Wide close-ups to bridge character and audience"
      - "Low angle looking up — giving grand scale to small worlds"
      - "Slow push-in for emotional accumulation"
    constraints:
      - "Not suitable for photorealistic, horror, or gritty projects"
      - "Requires skilled 3D animation pipeline"
      - "Child-like aesthetic may not fit mature themes"
  applicability:
    emotions:
      - warm
      - joyful
      - hopeful
      - nostalgic
      - emotional
    genres:
      - animation
      - family
      - adventure
      - comedy
      - drama
    keywords:
      - rounded shapes
      - soft lighting
      - squash and stretch
      - arcs
      - subsurface scattering
      - emotional color
      - NPR
  engine_guidance:
    when_to_use: "Project needs emotional warmth, family-friendly appeal, and expressive animated movement"
    recommended_actions:
      - "Use soft diffused lighting as default"
      - "Prioritize character expressiveness through squash-and-stretch"
      - "Color-grade shadows warm, never pure black"
    avoid:
      - "Hyper-realistic textures"
      - "Harsh shadows and sharp angles"
      - "Cold, clinical lighting"
  relationships:
    related:
      - style_arcane
    conflicts:
      - style_blade_runner_2049
      - style_denis_villeneuve
  version: "1.0"
