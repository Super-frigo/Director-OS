library:
  schema_version: "1.0"
  metadata:
    id: angle_dutch
    name: Dutch Angle — Instability and Dread
    author: Director OS (imported from AI-Director-OS shot_library)
  category: cinematography
  knowledge:
    concept: "Camera tilted on its roll axis so the horizon line is not level. Creates visceral sense of unease, imbalance, and psychological disorientation. The world itself is 'wrong'."
    principles:
      - "Tilted horizon = tilted world = tilted psyche"
      - "The world is not level — something is fundamentally wrong"
      - "Psychological state externalized through camera rotation"
      - "Degree of tilt correlates with degree of instability"
    emotional_effects:
      - unease
      - disorientation
      - psychological distress
      - instability
      - dread
    techniques:
      - "Use for psychological breakdown, intoxication, or supernatural events"
      - "Increase tilt angle for escalating instability"
      - "Combine with low angle for maximum disorientation"
      - "Return to level horizon to signal restoration of order"
    constraints:
      - "Classic film noir trope — can feel cliche"
      - "Motion sickness risk in extended sequences"
      - "Should have narrative justification — not just style"
  applicability:
    emotions:
      - unease
      - fear
      - disorientation
      - instability
      - dread
    genres:
      - noir
      - horror
      - thriller
      - psychological
    keywords:
      - Dutch angle
      - canted angle
      - tilted
      - oblique
      - unstable
  engine_guidance:
    when_to_use: "Character's mental state is fractured, or reality itself is unreliable"
    recommended_actions:
      - "Use at moments of psychological crisis or revelation"
      - "Return to level when character regains control"
    avoid:
      - "Casual use without narrative motivation"
      - "Long sequences — use sparingly for impact"
  relationships:
    related:
      - height_low_angle
    conflicts:
      - height_eye_level
  version: "1.0"
