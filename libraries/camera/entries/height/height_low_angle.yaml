library:
  schema_version: "1.0"
  metadata:
    id: height_low_angle
    name: Low Angle — Power and Threat
    author: Director OS (imported from AI-Director-OS shot_library)
  category: cinematography
  knowledge:
    concept: "Camera positioned below eye level, looking upward. Creates a sense of power, monumentality, or menace. The audience looks up at the subject — giving them weight and authority."
    principles:
      - "Upward perspective makes subject appear larger, more dominant"
      - "Architecture feels imposing; people feel powerful or threatening"
      - "The lower the camera, the more extreme the power dynamic"
      - "Combine with wide angle for exaggerated perspective distortion"
    emotional_effects:
      - power
      - threat
      - monumentality
      - awe
      - dominance
    techniques:
      - "Use for hero introductions, villain reveals"
      - "Combine with wide lens (<35mm) for dramatic perspective exaggeration"
      - "Slow push-in + low angle = escalating tension"
      - "Low angle on architecture emphasizes inhuman scale"
    constraints:
      - "Overuse makes every character feel dominant — loss of subtlety"
      - "Can feel comic-bookish if not motivated by narrative context"
  applicability:
    emotions:
      - awe
      - threat
      - power
      - dominance
      - fear
    genres:
      - action
      - epic
      - thriller
      - horror
    keywords:
      - low angle
      - up shot
      - worm's eye
      - power dynamic
  engine_guidance:
    when_to_use: "Character or structure needs to convey power, threat, or monumental scale"
    recommended_actions:
      - "Pair with wide lens for maximum impact"
      - "Use in character introduction for immediate power establishment"
    avoid:
      - "Intimate or vulnerable emotional moments"
      - "When the narrative intent is equality or connection"
  relationships:
    related:
      - height_high_angle
      - height_eye_level
    conflicts:
      - height_high_angle
  version: "1.0"
