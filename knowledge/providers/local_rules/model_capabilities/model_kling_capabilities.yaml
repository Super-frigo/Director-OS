library:
  schema_version: "1.0"
  metadata:
    id: model_kling_capabilities
    name: Kling (Kuaishou) Platform Capabilities
    author: Director OS
  category: model_capability
  knowledge:
    concept: "Kling is Kuaishou's video generation model with strong physics simulation and action handling."
    principles:
      - "Action-oriented language produces best results"
      - "Physical motion and physics are accurately simulated"
      - "Natural language descriptions preferred over technical camera terms"
      - "Less responsive to abstract cinematography terminology"
    emotional_effects: []
    techniques:
      - "Focus on describing what happens rather than camera technique"
      - "Specify subject action clearly (walks, runs, opens, turns)"
      - "Use concrete visual descriptions instead of emotional abstractions"
      - "Physics keywords (weight, momentum, gravity) improve motion realism"
    constraints:
      - "Abstract or metaphorical language may fail to generate"
      - "Cinematography terms less reliably interpreted"
      - "Long complex sentences may confuse action sequencing"
  applicability:
    emotions: []
    genres: []
    keywords:
      - kling
      - kuaishou
      - text_to_video
      - action
  engine_guidance:
    when_to_use: "Compiler is targeting Kling platform"
    recommended_actions:
      - "Lead with action description, then visual style"
      - "Avoid heavy cinematography terminology"
    avoid:
      - "Abstract emotional concepts without visual translation"
      - "Complex multi-clause sentences"
  relationships:
    related:
      - model_seedance_capabilities
      - model_veo_capabilities
  version: "1.0"
