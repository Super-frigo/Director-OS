library:
  schema_version: "1.0"
  metadata:
    id: model_seedance_capabilities
    name: Seedance Platform Capabilities
    author: Director OS
  category: model_capability
  knowledge:
    concept: "Seedance is a text-to-video generation platform. Understanding its capability boundaries is essential for Compiler translation accuracy."
    principles:
      - "Natural language descriptions preferred over technical notation"
      - "Best results with 10-20 word prompts focused on key elements"
      - "Static camera produces more reliable results than complex movement"
      - "Character consistency requires explicit visual description every shot"
    emotional_effects: []
    techniques:
      - "Keep prompts concise — 15-25 words optimal"
      - "Specify framing (e.g. 'wide shot') at start of prompt"
      - "Avoid abstract concepts — describe what the viewer sees"
      - "Re-describe character appearance each shot for consistency"
    constraints:
      - "Maximum single clip duration: 15 seconds"
      - "Complex camera moves may produce jittery results"
      - "Multiple characters increase inconsistency risk"
      - "Lighting changes between shots may be abrupt"
  applicability:
    emotions: []
    genres: []
    keywords:
      - seedance
      - platform
      - text_to_video
  engine_guidance:
    when_to_use: "Compiler is targeting Seedance platform"
    recommended_actions:
      - "Keep prompts under 25 words"
      - "Favor static camera or slow simple moves"
      - "Repeat key visual details for consistency"
    avoid:
      - "Complex multi-subject scenes"
      - "Fast camera movements"
      - "Abstract emotional concepts without visual translation"
  relationships:
    related:
      - model_veo_capabilities
      - model_kling_capabilities
  version: "1.0"
