library:
  schema_version: "1.0"
  metadata:
    id: style_blade_runner_2049
    name: Blade Runner 2049 — Deakins Amber & Teal
    author: Director OS (imported from AI-Director-OS)
  category: visual_style
  knowledge:
    concept: "Roger Deakins' signature cinematography — massive brutalist architecture, atmospheric haze with visible particles, amber/gold primary palette with teal/blue shadows. Megastructures that dwarf humans, volumetric light through fog, and saturated neon accents."
    principles:
      - "Massive scale architecture (Brutalism + Hi-Tech) that swallows characters"
      - "Visible atmospheric particles: haze, rain, snow, dust — 'air as a character'"
      - "Atmospheric perspective: desaturated distance, saturated foreground"
      - "Amber/gold-orange primary + teal/blue-gray secondary — Deakins signature"
      - "Dark areas lean blue-green, highlights lean warm gold — cold and warm coexist in one frame"
      - "Restrained saturation — colors feel 'washed by the desert'"
    emotional_effects:
      - lonely
      - dystopian
      - monumental
      - contemplative
      - melancholic
    techniques:
      - "Single light source per frame — everything else is residual glow"
      - "Backlight + silhouette — characters stand before giant light sources"
      - "Volumetric light (God Rays) through haze, blinds, and architectural gaps"
      - "Water on ground always present — reflections as 'another world's gaze'"
      - "Extremely slow push-ins: movement speed = audience breath-hold speed"
      - "Wide angle + deep focus: foreground to background all sharp"
      - "Symmetrical composition + one-point perspective — order as suffocation"
      - "Low angle looking up at buildings + high angle looking down at crowds"
    constraints:
      - "Not suitable for bright, cheerful, or fast-paced projects"
      - "Requires careful color grading to avoid muddy shadows"
      - "Difficult to achieve without volumetric rendering support"
  applicability:
    emotions:
      - lonely
      - melancholic
      - contemplative
      - awe
      - dread
    genres:
      - science_fiction
      - dystopian
      - noir
      - cyberpunk
      - thriller
    keywords:
      - amber
      - teal
      - volumetric
      - brutalist
      - haze
      - neon
      - Deakins
      - megastructure
  engine_guidance:
    when_to_use: "Project needs dystopian scale, atmospheric melancholy, and hyper-crafted cinematic lighting"
    recommended_actions:
      - "Set color grade: amber highlights, teal shadows"
      - "Add atmospheric haze and volumetric light"
      - "Use extreme wide shots to dwarf characters"
    avoid:
      - "Daylight scenes with blue sky"
      - "Fast camera movement"
      - "Cheerful or crowded compositions"
  relationships:
    related:
      - style_denis_villeneuve
      - color_teal_orange
    conflicts:
      - style_pixar
  version: "1.0"
