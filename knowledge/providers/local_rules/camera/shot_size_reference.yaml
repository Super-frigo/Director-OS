library:
  schema_version: '1.0'
  metadata:
    id: shot_size_reference
    name: Shot Size Reference — From ECU to ELS
    author: Director OS (imported from AI-Director-OS shot_library)
  category: cinematography
  knowledge:
    concept: Complete reference for shot sizes from Extreme Close-Up to Extreme Long
      Shot. Each framing distance serves a distinct narrative function — from revealing
      hidden details (ECU) to making characters vanishing points in the world (ELS).
    principles:
    - 'ECU (Extreme Close-Up): Eyes, fingers, object detail — reveals hidden information'
    - 'CU (Close-Up): Full face — emotional transmission, the character''s inner world'
    - 'MCU (Medium Close-Up): Chest up — dialogue with emotional reaction visible'
    - 'MS (Medium Shot): Waist up — narrative workhorse, action + expression'
    - 'FS (Full Shot): Full body — character''s relationship to space'
    - 'LS (Long Shot): Character occupies 1/3-1/4 of frame — environment begins to
      dominate'
    - 'ELS (Extreme Long Shot): Character is a dot — loneliness, epic scale, insignificance'
    emotional_effects:
    - varies_by_distance
    techniques:
    - Tighter = more emotional, more claustrophobic, more intense
    - Wider = more contextual, more isolating, more epic
    - Movement from wide to tight = moving toward emotional climax
    - Movement from tight to wide = release, isolation, or death
    - CU during emotional beats, MS for narrative, LS for environment
    constraints:
    - Constant CU is exhausting without wider relief
    - Constant LS is emotionally distant without tighter anchors
  applicability:
    emotions:
    - varies
    genres:
    - all
    keywords:
    - shot size
    - framing
    - distance
    - close-up
    - long shot
    - medium shot
  engine_guidance:
    when_to_use: Choosing framing for any shot in the project
    recommended_actions:
    - Match shot size to emotional intensity of the beat
    - Vary shot sizes within a scene for visual rhythm
    - Reserve ECU for critical detail reveals only
    avoid:
    - Using only one shot size for an entire scene
    - ELS when audience needs emotional connection
  relationships:
    related:
    - height_eye_level
    - framing_cu
    - framing_ecu
    - framing_els
    - framing_ls
    - framing_ms
  version: '1.0'
