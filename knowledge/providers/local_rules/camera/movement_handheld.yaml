library:
  schema_version: "1.0"
  metadata:
    id: movement_handheld
    name: Handheld Camera
    author: Director OS
  category: cinematography
  knowledge:
    concept: "Camera operated without stabilization, held by the operator. Natural human micro-movements, breathing rhythm, and slight instability."
    principles:
      - "Deliberate instability communicates subjective reality"
      - "Breathing rhythm of operator transfers to the frame"
      - "Intensity of movement scales with emotional intensity"
      - "Audience feels the presence of an observing human"
    emotional_effects:
      - urgency
      - immediacy
      - vulnerability
      - authenticity
      - chaos
    techniques:
      - "Calm handheld (slight sway) for intimate documentary feel"
      - "Agitated handheld for panic, chase, or combat"
      - "Sit camera on a surface for pseudo-static between handheld sections"
      - "Wide lenses reduce perceived shakiness; long lenses amplify it"
    constraints:
      - "Excessive handheld causes audience discomfort or nausea"
      - "Not suitable for formal or ceremonial scenes"
      - "Long takes require physical endurance from operator"
  applicability:
    emotions:
      - urgency
      - panic
      - authenticity
      - chaos
      - vulnerability
    genres:
      - horror
      - documentary
      - action
      - war
      - thriller
    keywords:
      - immediacy
      - reality
      - unstable
      - subjective
  engine_guidance:
    when_to_use: "Scene needs immediacy, documentary authenticity, or subjective instability"
    recommended_actions:
      - "Use for chase, combat, or panic sequences"
      - "Calm handheld for intimate revelations"
    avoid:
      - "Formal ceremonies, executions, solemn moments"
      - "Wide establishing shots (static serves better)"
  relationships:
    related:
      - movement_steadicam
      - movement_tracking
    conflicts:
      - movement_static
      - movement_crane
  version: "1.0"
