library:
  schema_version: "1.0"
  metadata:
    id: movement_dolly_in
    name: Dolly In / Push
    author: Director OS
  category: cinematography
  knowledge:
    concept: "Camera physically moves toward the subject on a track or wheeled platform. Changes perspective unlike zoom — parallax shifts with depth."
    principles:
      - "Physically moving closer changes spatial relationships"
      - "Foreground and background objects shift relative position (parallax)"
      - "Creates a sense of entering the character's space or mind"
      - "Speed of push controls emotional intensity"
    emotional_effects:
      - intrusion
      - discovery
      - realization
      - pressure
      - intimacy
    techniques:
      - "Slow push for contemplation and realization (THE FACE beats)"
      - "Fast push for shock, intrusion, or sudden insight"
      - "Dolly in on a static subject who remains unaware = audience knows before character"
      - "Combine with CU framing for maximum psychological pressure"
    constraints:
      - "Requires track or dolly equipment"
      - "Space behind camera must be clear"
      - "Speed must be consistent for smooth effect"
  applicability:
    emotions:
      - discovery
      - realization
      - pressure
      - intimacy
    genres:
      - thriller
      - drama
      - horror
      - romance
    keywords:
      - realization
      - approach
      - focus
      - intrusion
  engine_guidance:
    when_to_use: "Character discovers something, realizes a truth, or audience needs to focus on a single subject with growing intensity"
    recommended_actions:
      - "Use in REVELATION and CLIMAX beat types"
      - "Combine with CU framing for psychological close-ups"
    avoid:
      - "Action sequences (tracking shots serve better)"
      - "Neutral establishing scenes"
  relationships:
    related:
      - movement_slow_push
      - movement_dolly_out
    conflicts:
      - movement_handheld
  version: "1.0"
