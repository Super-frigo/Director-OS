library:
  schema_version: '1.0'
  metadata:
    id: movement_dolly_in
    name: Dolly In / Push
    author: Director OS
  category: cinematography
  knowledge:
    concept: Camera physically moves toward the subject on a track or wheeled platform.
      Changes perspective unlike zoom — parallax shifts with depth.
    principles:
    - Physically moving closer changes spatial relationships
    - Foreground and background objects shift relative position (parallax)
    - Creates a sense of entering the character's space or mind
    - Speed of push controls emotional intensity
    emotional_effects:
    - intrusion
    - discovery
    - realization
    - pressure
    - intimacy
    techniques:
    - Slow push for contemplation and realization (THE FACE beats)
    - Fast push for shock, intrusion, or sudden insight
    - Dolly in on a static subject who remains unaware = audience knows before character
    - Combine with CU framing for maximum psychological pressure
    - Dolly in with a slight tilt to emphasize the subject's emotional state (e.g.,
      a slight upward tilt to convey a sense of awe or respect).
    - Dolly in while racking focus from a background object to the subject to emphasize
      a change in the narrative focus or to highlight a character's realization.
    - Dolly in with a slow and steady pace to build suspense, especially when the
      subject is unaware of the impending threat or discovery.
    constraints:
    - Requires track or dolly equipment
    - Space behind camera must be clear
    - Speed must be consistent for smooth effect
    - Requires a skilled camera operator and dolly grip to execute smooth and precise
      movements, which can add to the production cost.
    - Outdoor dolly shots may be affected by uneven terrain or weather conditions,
      requiring additional time for setup and potential need for alternative equipment.
  applicability:
    emotions:
    - discovery
    - realization
    - pressure
    - intimacy
    genres:
    - thriller
    - drama
    - horror
    - romance
    keywords:
    - realization
    - approach
    - focus
    - intrusion
  engine_guidance:
    when_to_use: Character discovers something, realizes a truth, or audience needs
      to focus on a single subject with growing intensity
    recommended_actions:
    - Use in REVELATION and CLIMAX beat types
    - Combine with CU framing for psychological close-ups
    avoid:
    - Action sequences (tracking shots serve better)
    - Neutral establishing scenes
  relationships:
    related:
    - movement_slow_push
    - movement_dolly_out
    - movement_crane
    - movement_tracking
    - movement_truck
    conflicts:
    - movement_handheld
    - movement_dolly_out
  version: '1.0'
  examples:
    successful:
    - 'Goodfellas (1990) — Director: Martin Scorsese: In the scene where Henry Hill
      (Ray Liotta) describes the perfect heist, the camera dollies in on him as he
      explains the plan, creating a sense of intimacy and drawing the audience into
      the criminal underworld.'
    - 'The Godfather (1972) — Director: Francis Ford Coppola: The famous opening scene
      where the camera dollies in on Bonasera (Salvatore Corsitto) as he begs Don
      Vito Corleone (Marlon Brando) for justice, establishing the power dynamics and
      setting the tone for the rest of the film.'
    - 'Saving Private Ryan (1998) — Director: Steven Spielberg: In the opening D-Day
      sequence, the camera dollies in on Captain Miller (Tom Hanks) as he experiences
      the horrors of war, creating a sense of realism and immersion.'
    failure:
    - 'The Room (2003) — Director: Tommy Wiseau: The film infamously misuses dolly
      shots, often with abrupt and unnatural movements that distract and confuse the
      audience, demonstrating a lack of understanding of the technique''s purpose
      and execution.'
