library:
  schema_version: '1.0'
  metadata:
    id: light_color_temperature
    name: Color Temperature — The Color of Time
    author: Director OS (imported from AI-Director-OS shot_library)
  category: lighting
  knowledge:
    concept: Color temperature measured in Kelvin (K). Lower Kelvin = warmer, more
      intimate. Higher Kelvin = cooler, more distant. Temperature is the primary tool
      for communicating time of day, emotional atmosphere, and the warmth or coldness
      of a relationship.
    principles:
    - '1500-2000K (Candlelight): intimacy, fragility, privacy'
    - '2700-3500K (Tungsten/Warm Lamp): safety, belonging, nostalgia, home'
    - '4000-5000K (Twilight/Moonlight): the in-between, uncertain, transitional'
    - '5600-6500K (Overcast Daylight): objective, realistic, neutral'
    - '7000K+ (Cold Blue): alienation, technology, isolation, clinical'
    emotional_effects:
    - varies_by_temperature
    techniques:
    - Warm light for scenes of safety, family, romance
    - Cool light for scenes of alienation, technology, loneliness
    - Mixed temperature (warm key + cool ambient) = internal conflict
    - Shift temperature across a scene to show emotional arc
    constraints:
    - Extreme warm (candlelight) can feel dim — watch exposure
    - Extreme cool can feel inhuman — use sparingly
  applicability:
    emotions:
    - warmth
    - intimacy
    - alienation
    - coldness
    - nostalgia
    genres:
    - all
    keywords:
    - color temperature
    - Kelvin
    - warm light
    - cool light
    - tungsten
    - daylight
  engine_guidance:
    when_to_use: Setting the emotional temperature through light color
    recommended_actions:
    - Warm for safe, intimate, nostalgic moments
    - Cool for alienated, technological, isolated moments
    - Mixed for characters caught between two worlds
    avoid:
    - Clinical cool for romantic scenes
    - Warm candlelight for sterile, futuristic settings
  relationships:
    related:
    - light_direction_emotion
    - light_quality
    - light_emotion_mapping
    - light_special_effects
  version: '1.0'
