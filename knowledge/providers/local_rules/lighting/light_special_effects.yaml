library:
  schema_version: '1.0'
  metadata:
    id: light_special_effects
    name: Special Lighting Effects — Narrative Magic
    author: Director OS (imported from AI-Director-OS shot_library)
  category: lighting
  knowledge:
    concept: Special lighting effects that go beyond standard three-point setups.
      Volumetric light, neon, candlelight, screen light, strobe, and reflection —
      each carries specific narrative associations and creates unique visual texture.
    principles:
    - 'Volumetric Light (God Rays): divine, revelation, transcendence, passage through'
    - 'Neon: urban, desire, lonely splendor, artificial beauty'
    - 'Candlelight/Fire: intimacy, crisis, primal, pre-industrial'
    - 'Screen Light: modern loneliness — face lit by phone/monitor'
    - 'Strobe/Stroboscopic: chaos, combat, fractured consciousness'
    - 'Specular Reflection: indirect truth — we see through reflections'
    emotional_effects:
    - varies
    techniques:
    - 'Volumetric: smoke/haze + strong backlight through gaps'
    - 'Neon: colored practicals + bounce onto surfaces'
    - 'Candlelight: small warm source close to face, high contrast'
    - 'Screen light: blue/cool source from below face level'
    - 'Strobe: intermittent source, fast on/off during action'
    constraints:
    - Volumetric requires atmospheric particles (haze, smoke, dust)
    - Neon requires practical light sources or post-production
    - Strobe can be disorienting or trigger photosensitive conditions
  applicability:
    emotions:
    - varies
    genres:
    - all
    keywords:
    - volumetric
    - neon
    - candlelight
    - screen light
    - strobe
    - god rays
    - practical light
  engine_guidance:
    when_to_use: A scene needs a specific lighting signature beyond standard setups
    recommended_actions:
    - Use volumetric light for moments of revelation or transcendence
    - Use screen light for contemporary loneliness or technology themes
    - Use neon for urban night scenes with emotional isolation
    avoid:
    - Special effects without narrative motivation
    - Combining too many effects in one scene
  relationships:
    related:
    - light_direction_emotion
    - light_color_temperature
    - light_emotion_mapping
  version: '1.0'
