library:
  schema_version: "1.0"
  metadata:
    id: color_teal_orange
    name: Teal & Orange — The Universal Contrast
    author: Director OS
  category: visual_style
  knowledge:
    concept: "The dominant Hollywood color scheme. Teal (cyan-blue) in shadows and backgrounds; orange (skin tones + warm accents) in foreground. Natural color opposites on the color wheel."
    principles:
      - "Teal and orange are complementary colors — maximum visual contrast"
      - "Skin tones naturally fall in the orange range; teal backgrounds make skin pop"
      - "Teal shadows + orange highlights = instant cinematic look"
      - "The brain interprets this contrast as 'cinematic' through years of exposure"
    emotional_effects:
      - cinematic
      - polished
      - commercial
      - blockbuster
    techniques:
      - "Grade shadows toward teal, highlights toward orange"
      - "Use teal practical lights for backgrounds, warm key light on faces"
      - "Orange/teal split in costume design (blue costume, warm skin)"
      - "Teal fluorescent light vs warm tungsten — built-in contrast"
    constraints:
      - "Overuse feels formulaic and artificial"
      - "Not suitable for period films requiring naturalistic palettes"
      - "Character diversity requires careful teal adjustment for different skin tones"
  applicability:
    emotions:
      - polished
      - energetic
      - commercial
    genres:
      - action
      - blockbuster
      - science_fiction
      - thriller
    keywords:
      - blockbuster
      - contrast
      - commercial
      - hollywood
  engine_guidance:
    when_to_use: "Project requires mainstream cinematic polish and strong visual contrast"
    recommended_actions:
      - "Set shadow color to teal, highlight color to warm orange"
      - "Use complementary costume and production design"
    avoid:
      - "Period or naturalistic dramas requiring authentic palettes"
      - "Scenes where audience should feel cold and un-cinematic"
  relationships:
    related:
      - color_blue_cold
      - color_yellow_warm
    conflicts:
      - color_green_sick
  version: "1.0"
