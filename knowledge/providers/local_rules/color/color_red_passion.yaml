library:
  schema_version: "1.0"
  metadata:
    id: color_red_passion
    name: Red — Passion & Danger
    author: Director OS
  category: visual_style
  knowledge:
    concept: "The most visually dominant color. Signals danger, passion, violence, or heightened emotion. Immediately draws viewer attention."
    principles:
      - "Red is the highest-visibility color in human vision"
      - "A single red object in a desaturated frame becomes the focal point"
      - "Red light signals danger or heightened emotional state"
      - "Desaturated red reads as dried blood, violence past"
    emotional_effects:
      - danger
      - passion
      - violence
      - urgency
      - love
    techniques:
      - "Use red as accent color in an otherwise cool palette (the red coat effect)"
      - "Red light on faces for threat or intensity"
      - "Red practicals (neon signs, tail lights) for urban danger"
      - "Slow fade to red for fever dream or hyper-intense states"
    constraints:
      - "Overuse desensitizes — one red accent per frame maximum"
      - "Bright red on skin reads as burns or illness"
      - "Avoid red in scenes where audience should feel calm"
  applicability:
    emotions:
      - danger
      - passion
      - anger
      - urgency
      - desire
    genres:
      - horror
      - thriller
      - romance
      - action
    keywords:
      - blood
      - warning
      - intensity
      - love
  engine_guidance:
    when_to_use: "Scene requires heightened emotional intensity, danger, or a focal point of passion"
    recommended_actions:
      - "Desaturate everything except one red element for maximum focus"
      - "Use red practical light for threatening environments"
    avoid:
      - "Calm or peaceful resolutions"
      - "Scenes requiring visual neutrality"
  relationships:
    related:
      - color_blue_cold
      - color_yellow_warm
    conflicts:
      - color_teal_orange
  version: "1.0"
