# Cache Warmup Queries
# =====================
# These queries are run by scripts/warmup_cache.py to pre-fill the LLM cache.
# After warmup, all Engine queries that match these combinations hit cache
# immediately without calling the LLM.
#
# Coverage strategy: cross-product of common creative parameters per domain.

version: "1.0"

domains:
  composition:
    - { emotion: "loneliness", scene_type: "interior", character_count: 1 }
    - { emotion: "tension", scene_type: "alleyway", character_count: 2 }
    - { emotion: "fear", scene_type: "confined_space", character_count: 1 }
    - { emotion: "joy", scene_type: "exterior_wide", character_count: 3 }
    - { emotion: "sadness", scene_type: "interior_dim", character_count: 1 }
    - { emotion: "anger", scene_type: "interior_harsh", character_count: 1 }
    - { emotion: "hope", scene_type: "exterior_open", character_count: 1 }
    - { emotion: "confusion", scene_type: "urban_crowded", character_count: 1 }
    - { emotion: "intimacy", scene_type: "interior_warm", character_count: 2 }
    - { emotion: "power", scene_type: "interior_grand", character_count: 1 }

  lighting:
    - { mood: "noir", location: "bar", time_of_day: "night", genre: "thriller" }
    - { mood: "romantic", location: "restaurant", time_of_day: "evening", genre: "romance" }
    - { mood: "tense", location: "alleyway", time_of_day: "night", genre: "thriller" }
    - { mood: "hopeful", location: "field", time_of_day: "golden_hour", genre: "drama" }
