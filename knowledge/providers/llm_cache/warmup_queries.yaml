    - { mood: "cold", location: "office", time_of_day: "day", genre: "sci_fi" }
    - { mood: "warm", location: "home", time_of_day: "golden_hour", genre: "family" }
    - { mood: "clinical", location: "hospital", time_of_day: "day", genre: "drama" }

  camera:
    - { character_state: "vulnerable", shot_size: "CU", movement_type: "static", emotion: "fear" }
    - { character_state: "powerful", shot_size: "LS", movement_type: "slow_push", emotion: "confidence" }
    - { character_state: "confused", shot_size: "MS", movement_type: "handheld", emotion: "confusion" }
    - { character_state: "determined", shot_size: "MCU", movement_type: "tracking", emotion: "determination" }
    - { character_state: "isolated", shot_size: "ELS", movement_type: "slow_pull", emotion: "loneliness" }
    - { character_state: "intimate", shot_size: "CU", movement_type: "static", emotion: "love" }
    - { character_state: "threatened", shot_size: "OTS", movement_type: "dolly_in", emotion: "fear" }
    - { character_state: "triumphant", shot_size: "LS", movement_type: "crane_up", emotion: "joy" }

  color:
    - { emotion: "loneliness", genre: "drama", era: "contemporary", style_reference: "" }
    - { emotion: "tension", genre: "thriller", era: "contemporary", style_reference: "" }
    - { emotion: "nostalgia", genre: "drama", era: "1970s", style_reference: "" }
    - { emotion: "hope", genre: "adventure", era: "contemporary", style_reference: "" }
    - { emotion: "dread", genre: "horror", era: "contemporary", style_reference: "" }
    - { emotion: "wonder", genre: "sci_fi", era: "future", style_reference: "" }

  storytelling:
    - { genre: "thriller", premise: "", beat_count: 15, structure_type: "three_act" }
    - { genre: "romance", premise: "", beat_count: 12, structure_type: "three_act" }
